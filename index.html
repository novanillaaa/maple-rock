--quiz-font-body: 'Nunito', 'Segoe UI', sans-serif; /* Body text - soft & readable */

/* SIZING */

--quiz-border-radius: 12px; /* Rounded corners */

}

* {

}

.quiz-wrapper {

/* Header */

.quiz-title {

}

.quiz-subtitle {

.progress-text {

.progress-bar {

.progress-fill {

@keyframes fadeIn {

.question-number {

.answer-option:hover {

let currentQuestion = 0;
let answers = [];
let scores = [];
let tiedCharacters = []; // Stores indices of tied characters

function initScores() {
  scores = new Array(characters.length).fill(0);
}

function startQuiz() {
  currentQuestion = 0;
  answers = new Array(questions.length).fill(null);
  tiedCharacters = [];
  initScores();
  
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('resultsScreen').classList.add('hidden');
  document.getElementById('tiebreakerScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('totalQ').textContent = questions.length;
  
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQuestion];
  const letters = ['A', 'B', 'C', 'D'];
  
  document.getElementById('currentQ').textContent = currentQuestion + 1;
  
  const progress = ((currentQuestion) / questions.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';
  document.getElementById('progressPercent').textContent = Math.round(progress) + '%';
  
  let html = `
    <div class="question-number">Question ${currentQuestion + 1}</div>
    <div class="question-text">${q.question}</div>
    <div class="answers-list">
  `;
  
  q.answers.forEach((answer, index) => {
    const selected = answers[currentQuestion] === index ? 'selected' : '';
    html += `
      <div class="answer-option ${selected}" onclick="selectAnswer(${index})">
        <span class="answer-letter">${letters[index]}</span>
        <span class="answer-text">${answer.text}</span>
      </div>
    `;
  });
  
  html += '</div>';
  document.getElementById('questionCard').innerHTML = html;
  
  // Update navigation buttons
  document.getElementById('prevBtn').disabled = currentQuestion === 0;
  document.getElementById('nextBtn').disabled = answers[currentQuestion] === null;
  document.getElementById('nextBtn').textContent = 
    currentQuestion === questions.length - 1 ? 'See Results ♡' : 'Next →';
}

function selectAnswer(index) {
  answers[currentQuestion] = index;
  
  // Update visual selection
  document.querySelectorAll('.answer-option').forEach((el, i) => {
    el.classList.toggle('selected', i === index);
  });
  
  document.getElementById('nextBtn').disabled = false;
}

function nextQuestion() {
  if (currentQuestion < questions.length - 1) {
    currentQuestion++;
    renderQuestion();
  } else {
    calculateResults();
  }
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
  }
}

function calculateResults() {
  initScores();
  
  // Tally up points
  answers.forEach((answerIndex, questionIndex) => {
    if (answerIndex !== null) {
      const characterIndex = questions[questionIndex].answers[answerIndex].points;
      scores[characterIndex]++;
    }
  });
  
  // Find the highest score
  const maxScore = Math.max(...scores);
  
  // Find ALL characters with that highest score
  tiedCharacters = [];
  scores.forEach((score, index) => {
    if (score === maxScore) {
      tiedCharacters.push(index);
    }
  });
  
  // If there's a tie, show tiebreaker! Otherwise show results
  if (tiedCharacters.length > 1) {
    showTiebreaker();
  } else {
    showResults(tiedCharacters[0]);
  }
}

function showTiebreaker() {
  document.getElementById('quizScreen').classList.add('hidden');
  
  // Build the tiebreaker question with only the tied characters as options
  const tiedNames = tiedCharacters.map(i => characters[i].name).join(' & ');
  
  let html = `
    <div class="quiz-header">
      <h1 class="quiz-title">It's a Tie!</h1>
      <p class="quiz-subtitle">Your heart is torn between ${tiedNames}...</p>
    </div>
    
    <div class="question-card">
      <div class="question-number">~ Tiebreaker ~</div>
      <div class="question-text">${tiebreakerQuestion.question}</div>
      <div class="answers-list">
  `;
  
  // Show only the tied characters as options with their tiebreaker answers
  tiedCharacters.forEach((charIndex, i) => {
    const letter = String.fromCharCode(65 + i); // A, B, C, D...
    const answerText = tiebreakerQuestion.answers[charIndex] || `Choose ${characters[charIndex].name}`;
    html += `
      <div class="answer-option" onclick="selectTiebreaker(${charIndex})">
        <span class="answer-letter">${letter}</span>
        <span class="answer-text">${answerText}</span>
      </div>
    `;
  });
  
  html += `
      </div>
    </div>
  `;
  
  document.getElementById('tiebreakerScreen').innerHTML = html;
  document.getElementById('tiebreakerScreen').classList.remove('hidden');
}

function selectTiebreaker(characterIndex) {
  // Highlight selection briefly then show results
  event.target.closest('.answer-option').classList.add('selected');
  
  setTimeout(() => {
    showResults(characterIndex);
  }, 400);
}

function showResults(characterIndex) {
  const character = characters[characterIndex];
  
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('tiebreakerScreen').classList.add('hidden');
  
  let html = `
    <div class="results-card">
      <div class="results-label">Your Lover Is...</div>
      ${character.image ? `<img src="${character.image}" alt="${character.name}" class="results-image">` : ''}
      <div class="results-character">${character.name}</div>
      <div class="results-description">${character.description}</div>
    </div>
    <button class="restart-btn" onclick="startQuiz()">Take Quiz Again ♡</button>
  `;
  
  document.getElementById('resultsScreen').innerHTML = html;
  document.getElementById('resultsScreen').classList.remove('hidden');
}
</script>
